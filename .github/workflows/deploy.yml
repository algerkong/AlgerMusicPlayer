name: Deploy Web

on:
  push:
    branches:
      - main # 或者您的主分支名称
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: npm

      - name: 创建环境变量文件
        run: |
          # 仅写入构建用 env，禁止 cat/echo 到日志以免泄露 secrets
          echo "VITE_API=${{ secrets.VITE_API }}" > .env.production.local
          echo "VITE_API_MUSIC=${{ secrets.VITE_API_MUSIC }}" >> .env.production.local

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@5bb815ae7f76baf13e1646dc59b8239beeb6ed57  # master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'out/renderer/*'
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 2

      - name: Execute Remote Commands
        uses: appleboy/ssh-action@068c0c7a4e59a5ae12fb7cb454b05735d830c82b  # master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo "部署完成于 $(date)"
