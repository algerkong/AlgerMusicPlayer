# Web 静态部署（仅 renderer）。Electron 听歌依赖主进程 ly-music-source，
# 此产物无法完整在线播放，仅作界面预览 / 可选托管。
name: Deploy Web

on:
  workflow_dispatch: # 仅手动触发，避免误推无音源空壳

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # 当前构建不依赖 VITE_API；勿写入过期音源 env
      - name: Build renderer
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@5bb815ae7f76baf13e1646dc59b8239beeb6ed57 # master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'out/renderer/*'
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 2

      - name: Execute Remote Commands
        uses: appleboy/ssh-action@068c0c7a4e59a5ae12fb7cb454b05735d830c82b # master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo "部署完成于 $(date)"
